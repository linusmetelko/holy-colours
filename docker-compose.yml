services:
  holy-colours:
    build:
      context: .
    image: holy-colours:local
    container_name: holy-colours
    restart: unless-stopped
    environment:
      HOLY_COLOURS_HOST: 0.0.0.0
      HOLY_COLOURS_PORT: 8000
      HOLY_COLOURS_PRESETS_PATH: /data/presets.json
      HOLY_COLOURS_AUTH_USERNAME: ${HOLY_COLOURS_AUTH_USERNAME:?Set HOLY_COLOURS_AUTH_USERNAME}
      HOLY_COLOURS_AUTH_PASSWORD: ${HOLY_COLOURS_AUTH_PASSWORD:?Set HOLY_COLOURS_AUTH_PASSWORD}
    volumes:
      - holy-colours-data:/data
    ports:
      - 127.0.0.1:8000:8000
    labels:
      - traefik.enable=true
      - traefik.http.routers.holy-colours.rule=Host(`${HOLY_COLOURS_DOMAIN:?Set HOLY_COLOURS_DOMAIN}`)
      - traefik.http.routers.holy-colours.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.holy-colours.tls=true
      - traefik.http.routers.holy-colours.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}
      - traefik.http.services.holy-colours.loadbalancer.server.port=8000

volumes:
  holy-colours-data:
